services:
  - type: web
    name: file-flex-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: file-flex-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATA_DIR
        value: /data
      - key: REQUIRE_PERSISTENT_STORAGE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: file-flex-bot-db
          property: connectionString

databases:
  - name: file-flex-bot-db
    plan: free
    databaseName: fileflexbot
    user: fileflexbot
